<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Theme-aware favicons -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
      sizes="any"
    />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.png"
      sizes="32x32"
      type="image/png"
    />
    <link
      rel="shortcut icon"
      href="%sveltekit.assets%/favicon.png"
      type="image/png"
    />
    <link
      rel="mask-icon"
      href="%sveltekit.assets%/safari-pinned-tab.svg"
      color="#ffb000"
    />

    <!-- Apple touch icons for all device sizes -->
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="%sveltekit.assets%/icons/icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="167x167"
      href="%sveltekit.assets%/icons/icon-152x152.png"
    />

    <!-- App configuration -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="author" content="Pablo" />
    <meta name="application-name" content="ZipList" />
    <meta name="color-scheme" content="light" />

    <!-- Manifest -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

    <!-- PWA related meta tags -->
    <meta name="theme-color" content="#FFF6E6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ZipList" />
    <meta name="msapplication-TileColor" content="#FFF6E6" />

    <!-- iOS specific splash screens (main sizes) -->
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-2048x2732.png"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1668x2388.png"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1536x2048.png"
      media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1125x2436.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-1284x2778.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="%sveltekit.assets%/splash/apple-splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />

    <script>
      // Apply saved theme immediately to prevent flash of default theme
      // StorageUtils inline helpers
      function getStorageItem(key, defaultValue) {
        if (typeof localStorage === "undefined") return defaultValue;

        try {
          const item = localStorage.getItem(key);
          return item !== null ? item : defaultValue;
        } catch (e) {
          console.warn(`Error reading ${key} from localStorage:`, e);
          return defaultValue;
        }
      }

      function setStorageItem(key, value) {
        if (typeof localStorage === "undefined") return false;

        try {
          localStorage.setItem(key, value);
          return true;
        } catch (e) {
          console.warn(`Error saving ${key} to localStorage:`, e);
          return false;
        }
      }

      // Apply theme using storage helpers
      // "The Desk Drawer" roster (re-cut 2026-07-21). Any stale saved
      // theme not in this list (e.g. a retired one from an older roster)
      // falls back cleanly to DEFAULT_THEME below — never breaks.
      const THEME_KEY = "ziplist-vibe";
      const DEFAULT_THEME = "highlighter";
      const ALLOWED_THEMES = [
        "highlighter",
        "sticky-note",
        "gel-pen",
        "legal-pad",
      ];

      let savedTheme = getStorageItem(THEME_KEY, DEFAULT_THEME);
      if (!ALLOWED_THEMES.includes(savedTheme)) {
        savedTheme = DEFAULT_THEME;
        setStorageItem(THEME_KEY, DEFAULT_THEME);
      }
      document.documentElement.setAttribute("data-theme", savedTheme);
      window.__theme = savedTheme;

      // Check for chunky mode preference, default to true for pop-punk
      const CHUNKY_MODE_KEY = "ziplist-chunky-mode";
      const savedChunkyMode = getStorageItem(CHUNKY_MODE_KEY, "true");

      if (savedChunkyMode === "true") {
        document.documentElement.classList.add("mode-neo-brutalist");
      }

      // Set initialization flag to prevent duplicate theme application
      window.themeInitialized = true;

      // Force reflow to ensure theme is applied before content renders
      if (typeof document !== "undefined") {
        void document.documentElement.offsetWidth;
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ZipList",
        "url": "https://ziplist.app",
        "applicationCategory": "UtilitiesApplication",
        "applicationSubCategory": "Checklist Utility",
        "operatingSystem": "Web",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "Make a checklist by talking. ZipList is a warm little web app for groceries, errands, packing, gear, chores, and quick shared lists.",
        "featureList": [
          "Talk-to-list capture",
          "Checklist editing and reordering",
          "Multiple saved lists",
          "Progressive web app installation",
          "Optional shared live lists"
        ],
        "potentialAction": {
          "@type": "ConsumeAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://ziplist.app",
            "actionPlatform": [
              "http://schema.org/DesktopWebPlatform",
              "http://schema.org/MobileWebPlatform"
            ]
          },
          "expectsAcceptanceOf": {
            "@type": "Offer",
            "category": "free",
            "description": "Free talk-to-list checklist service"
          }
        },
        "browserRequirements": "Requires HTTPS and a modern browser with microphone and MediaRecorder support. Works best in Chrome, Edge, Safari, and Firefox.",
        "keywords": "voice checklist app, talk to list, voice to list, grocery checklist, shared checklist, packing checklist, web checklist app"
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
