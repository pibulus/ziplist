# Launch hints for Launch Arsenal.
# Project-facing launch metadata. Keep it sharp and human.
name: ziplist
slug: ziplist
app_type: web-app
audience: people who want to talk a small list into existence
problem: notes apps make spoken lists messy, while todo apps make you set up the container before the thought is down
promise: Talk it into a list. Tick it off.
cta: Try ZipList.
differentiators:
  - Make a checklist by talking
  - No dates, priorities, reminders, or setup
  - Add more to the active list whenever
  - Three warm color lists by default with swipe navigation
  - Local-first persistence so everyday lists stay fast, private, and account-free
  - Mobile list rows tuned for one-hand checking, deleting, editing, and reordering
  - Installable web app, no app store required
proof_points:
  - Recording flow turns speech into clean checklist items through the server route
  - List parser cleans bullets, speech prefixes, quotes, duplicates, and oversized items
  - Active-list appending lets people choose a list, talk again, and add more
  - Multiple list CRUD with rename, reorder, share, and color-safe creation
  - Recent mobile pass verified list sizing at 375px and 390px widths
objections:
  - Still wants a real physical iPhone PWA pass before launch copy gets too confident
  - Live collaboration exists as optional PartyKit infrastructure, not the main launch promise yet
keywords:
  seed:
    - ziplist
    - talk to list
    - voice to list
    - voice checklist
    - shared checklist
  audience: people who want to talk a quick list into existence
  intent:
    - dictate a list
    - make a checklist by voice
    - capture errands quickly
manual_notes:
  - Keep the tone plain, warm, tactile, and practical.
  - Never mention AI in user-facing launch copy.
  - Avoid productivity, planner, urgency, optimization, and task-manager language.
  - The durable product line is talk -> list -> tick.
  - Contributor framing is more room, sync, live sharing, fun sounds, and themes, not basic usefulness.
